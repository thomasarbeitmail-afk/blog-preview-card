<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Blog preview card</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>

    :root {
      --color-yellow: hsl(47, 88%, 63%);
      --color-white: hsl(0, 0%, 100%);

      --gray-500:hsl(0, 0%, 42%);
      --gray-950:hsl(0, 0%, 7%);

      --body-copy: 1rem;
      --font-family: 'Figtree';
      --font-weight-medium: 500;
      --font-weight-bold: 800;

      --font-size-title: 1.5rem;
      --font-size-medium: 1rem;
      --font-size-small: 0.875rem;

      --line-height: 150%;

      --spacing-300: 1.5rem;
      --spacing-150: 0.75rem;
      --spacing-100: 0.5rem;
      --spacing-50: 0.25rem;
    }

    * {
      margin: unset;
      padding: unset;
      box-sizing: border-box;
    }

    footer {
      position: absolute;
      padding: var(--spacing-150);
      bottom: 0;
    }

    h1, p {
      line-height: var(--line-height);
    }

    body {
      height: 100vh;
      width: 100vw;
      font-family: var(--font-family), 'sans-serif';
      background-color: var(--color-yellow);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    main {
      height: 100%;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 var(--spacing-300);
    }

    .blog-card {
      max-width: 384px;
      width: 100%;
      padding: var(--spacing-300);
      border-radius: 20px;
      background-color: var(--color-white);
      display:flex;
      flex-direction: column;
      gap: var(--spacing-300);
      box-shadow: 8px 8px 0 0 #000;
      cursor: pointer;
    }

    .blog-card__content {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-150);
    }

    .blog-card__publish-date {
      font-size: var(--font-size-small);
      font-weight: var(--font-weight-medium);
      color: var(--gray-950);
    }

    .blog-card__title {
      font-size: var(--font-size-title);
      font-weight: var(--font-weight-bold);
      color: var(--gray-950);
      transition: color ease .1s
    }

    .blog-card__description {
      font-size: var(--font-size-medium);
      font-weight: var(--font-weight-medium);
      color: var(--gray-500);
    }

    .blog-card img {
      border-radius: 10px;
    }

    .blog-card__author {
      display: flex;
      align-items: center;
      gap: var(--spacing-150);
    }

    .blog-card__author-avatar {
      width: 2rem;
      height: 2rem;
      border-radius: 999px;
    }

    .blog-card__author-name {
      font-size: var(--font-size-small);
      font-weight: var(--font-weight-bold);
      color: var(--gray-950);
    }

    .blog-card:hover .blog-card__title {
      color: var(--color-yellow) !important;
    }

    .tag {
      font-size: var(--font-size-small);
      font-weight: var(--font-weight-bold);
      display: flex;
      padding: var(--spacing-50) var(--spacing-150);
      border-radius: 4px;
      color: var(--gray-950);
      background-color: var(--color-yellow);
      width: fit-content
    }


    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>

  <main>
    <div class="blog-card">
      <img src="./assets/images/illustration-article.svg" alt="Blog Article Image">
      <div class="blog-card__content">
        <div class="tag">Learning</div>
        <p class="blog-card__publish-date">Published 21 Dec 2023</p>
        <h1 class="blog-card__title">HTML & CSS foundations</h1>
        <p class="blog-card__description">These languages are the backbone of every website, defining structure, content, and presentation.</p>
      </div>
      <div class="blog-card__author">
        <img src="./assets/images/image-avatar.webp" alt="Photo of the Author Greg Hooper" class="blog-card__author-avatar">
        <p class="blog-card__author-name">Greg Hooper</p>
      </div>
    </div>
  </main>
  
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Your Name Here</a>.
  </footer>
</body>
</html>
